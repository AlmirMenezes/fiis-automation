name: FIIs Diário

on:
  schedule:
    - cron: '0 22 * * 1-5'  # seg a sex às 19h Brasil
  workflow_dispatch:

permissions:
  contents: write

jobs:
  executar:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependências
        run: |
          pip install pandas requests beautifulsoup4 lxml cloudscraper

      # 🔹 1. Gera lista de FIIs
      - name: Executar lista diária
        run: |
          python 01_lista_diaria_fiis.py

      # 🔹 2. Gera detalhes dos FIIs
      - name: Executar detalhes dos FIIs
        run: |
          python 03_detalhes_fiis.py

      # 🔹 3. Salvar tudo no repositório
      - name: Salvar resultado no repositório
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add .
          git commit -m "Atualização automática FIIs" || echo "Sem mudanças"
          git push
